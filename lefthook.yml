pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,mts,js,mjs,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: typecheck
      glob: "*.{ts,mts}"
      run: pnpm tsc -noEmit -skipLibCheck

pre-push:
  jobs:
    - name: tests
      run: pnpm test
